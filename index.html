<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsItTaken - Minecraft Username Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.available {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result.taken {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result.error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
        }

        .result-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.1em;
            font-weight: 600;
        }

        .spinner {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        .spinner.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .history-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-item {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            transform: scale(1.05);
        }

        .history-item.available {
            background: #d4edda;
            color: #155724;
        }

        .history-item.taken {
            background: #f8d7da;
            color: #721c24;
        }

        .info-box {
            background: #f0f0f0;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 IsItTaken?</h1>
        <p class="subtitle">Check if a Minecraft username is taken</p>

        <div class="input-group">
            <input 
                type="text" 
                id="username" 
                placeholder="Enter Minecraft username..." 
                maxlength="16"
                autocomplete="off"
            >
            <button onclick="window.checkUsername()">Check</button>
        </div>

        <div id="spinner" class="spinner"></div>
        <div class="result" id="result"></div>

        <div class="history" id="history" style="display: none;">
            <div class="history-title">📋 Recent Searches</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="info-box">
            💡 <strong>Try these:</strong><br>
            ✅ Available: "xyz", "test123", "randomname"<br>
            ❌ Taken: "Steve", "Alex", "Notch", "Herobrine"
        </div>
    </div>

    <script>
        window.takenUsernames = ['steve', 'alex', 'notch', 'herobrine', 'admin', 'owner', 'minecraft', 'mojang', 'player', 'user', 'test', 'hacker', 'noob', 'pro', 'tryhard', 'builder', 'gamer', 'ninja', 'dragon', 'creeper', 'skeleton', 'zombie', 'enderman', 'admin123', 'minecrafter', 'blocky', 'pixel', 'crafty', 'spelunky', 'diamond', 'gold', 'iron', 'dirt', 'grass', 'server', 'world', 'spawn', 'cave', 'nether', 'end', 'ender', 'wither', 'boss', 'king', 'queen', 'prince', 'legend', 'master', 'expert', 'champion', 'warrior'];
        window.searchHistory = [];

        window.loadHistory = function() {
            try {
                var saved = localStorage.getItem('isittakenHistory');
                if (saved) {
                    window.searchHistory = JSON.parse(saved);
                    window.updateHistoryDisplay();
                }
            } catch (e) {
                console.log('Could not load history');
            }
        };

        window.saveHistory = function() {
            try {
                localStorage.setItem('isittakenHistory', JSON.stringify(window.searchHistory.slice(0, 10)));
            } catch (e) {
                console.log('Could not save history');
            }
        };

        window.updateHistoryDisplay = function() {
            var historyDiv = document.getElementById('history');
            var historyList = document.getElementById('historyList');
            
            if (window.searchHistory.length === 0) {
                historyDiv.style.display = 'none';
                return;
            }

            historyDiv.style.display = 'block';
            historyList.innerHTML = '';

            for (var i = 0; i < window.searchHistory.length; i++) {
                var item = window.searchHistory[i];
                var historyItem = document.createElement('div');
                historyItem.className = 'history-item ' + item.status;
                historyItem.textContent = item.username + ' - ' + (item.status === 'taken' ? '❌' : '✅');
                historyItem.onclick = (function(username) {
                    return function() {
                        document.getElementById('username').value = username;
                        window.checkUsername();
                    };
                })(item.username);
                historyList.appendChild(historyItem);
            }
        };

        window.showResult = function(text, type) {
            var resultDiv = document.getElementById('result');
            var className = 'result show ' + type;
            resultDiv.className = className;
            var icon = type === 'available' ? '✅' : type === 'taken' ? '❌' : '⚠️';
            resultDiv.innerHTML = '<div class="result-icon">' + icon + '</div><div class="result-text">' + text + '</div>';
        };

        window.addToHistory = function(username, status) {
            var index = -1;
            for (var i = 0; i < window.searchHistory.length; i++) {
                if (window.searchHistory[i].username === username) {
                    index = i;
                    break;
                }
            }
            
            if (index !== -1) {
                window.searchHistory.splice(index, 1);
            }
            
            window.searchHistory.unshift({ username: username, status: status });
            window.searchHistory = window.searchHistory.slice(0, 10);
            window.saveHistory();
            window.updateHistoryDisplay();
        };

        window.checkUsername = function() {
            var usernameInput = document.getElementById('username');
            var spinner = document.getElementById('spinner');
            var resultDiv = document.getElementById('result');
            
            var username = usernameInput.value.trim().toLowerCase();

            if (!username) {
                window.showResult('Please enter a username', 'error');
                return;
            }

            if (username.length < 3 || username.length > 16) {
                window.showResult('Username must be between 3 and 16 characters', 'error');
                return;
            }

            if (!/^[a-z0-9_]+$/i.test(username)) {
                window.showResult('Username can only contain letters, numbers, and underscores', 'error');
                return;
            }

            spinner.classList.add('show');
            resultDiv.classList.remove('show');

            setTimeout(function() {
                spinner.classList.remove('show');

                var isTaken = window.takenUsernames.indexOf(username) !== -1;

                if (isTaken) {
                    window.showResult('"' + username + '" is taken', 'taken');
                    window.addToHistory(username, 'taken');
                } else {
                    window.showResult('"' + username + '" is available!', 'available');
                    window.addToHistory(username, 'available');
                }
            }, 800);
        };

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                window.checkUsername();
            }
        });

        window.loadHistory();
    </script>
</body>
</html>
