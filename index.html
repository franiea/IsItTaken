<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsItTaken - Minecraft Username Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.available {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result.taken {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result.error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
        }

        .result-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1.1em;
            font-weight: 600;
        }

        .result-username {
            font-size: 0.95em;
            margin-top: 8px;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .history-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-item {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
        }

        .history-item.available {
            background: #d4edda;
            color: #155724;
        }

        .history-item.taken {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 IsItTaken?</h1>
        <p class="subtitle">Check if a Minecraft username is taken</p>

        <div class="input-group">
            <input 
                type="text" 
                id="username" 
                placeholder="Enter Minecraft username..." 
                maxlength="16"
                autocomplete="off"
            >
            <button onclick="checkUsername()">Check</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Checking username...</p>
        </div>

        <div class="result" id="result"></div>

        <div class="history" id="history" style="display: none;">
            <div class="history-title">Recent Searches</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const historyDiv = document.getElementById('history');
        const historyList = document.getElementById('historyList');

        let searchHistory = [];

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('isittakenHistory');
            if (saved) {
                searchHistory = JSON.parse(saved);
                updateHistoryDisplay();
            }
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('isittakenHistory', JSON.stringify(searchHistory.slice(0, 10)));
        }

        // Update history display
        function updateHistoryDisplay() {
            if (searchHistory.length === 0) {
                historyDiv.style.display = 'none';
                return;
            }

            historyDiv.style.display = 'block';
            historyList.innerHTML = '';

            searchHistory.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = `history-item ${item.status}`;
                historyItem.textContent = `${item.username} - ${item.status === 'taken' ? '❌ Taken' : '✅ Available'}`;
                historyList.appendChild(historyItem);
            });
        }

        // Check username function
        async function checkUsername() {
            const username = usernameInput.value.trim();

            if (!username) {
                showResult('Please enter a username', 'error');
                return;
            }

            if (username.length < 3 || username.length > 16) {
                showResult('Username must be between 3 and 16 characters', 'error');
                return;
            }

            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show');

            try {
                // Using Mojang's UUID API
                const response = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);

                loadingDiv.classList.remove('show');

                if (response.ok) {
                    // Username is taken
                    showResult(`❌ "${username}" is taken`, 'taken');
                    addToHistory(username, 'taken');
                } else if (response.status === 404) {
                    // Username is available
                    showResult(`✅ "${username}" is available!`, 'available');
                    addToHistory(username, 'available');
                } else {
                    showResult('Error checking username. Please try again.', 'error');
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                showResult('Network error. Please check your connection and try again.', 'error');
                console.error('Error:', error);
            }
        }

        // Show result function
        function showResult(text, status) {
            resultDiv.className = `result show ${status}`;
            resultDiv.innerHTML = `
                <div class="result-icon">
                    ${status === 'available' ? '✅' : status === 'taken' ? '❌' : '⚠️'}
                </div>
                <div class="result-text">${text}</div>
            `;
        }

        // Add to history
        function addToHistory(username, status) {
            searchHistory.unshift({ username, status });
            searchHistory = searchHistory.slice(0, 10); // Keep only 10 most recent
            saveHistory();
            updateHistoryDisplay();
        }

        // Allow Enter key to check
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkUsername();
            }
        });

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
